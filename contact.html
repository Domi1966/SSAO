<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>
<header class="header">
    <nav>
        <h1><a href="./index.html">SSAO</a></h1>
        <ul>
            <li><a href="./index.html">Accueil</a></li>
            <li><a href="./ssa.html">SSA</a></li>
            <li><a class="active" href="./contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<body>
    <section class="s-e">
        <h1 class="text-center-italic-red">Nous contacter</h1>
        <h2 class="text-center-italic">
            Une question, une envie de vous engager, une proposition ?
        </h2>
        <h2 class="text-center-italic">
            Écrivez-nous, nous vous répondrons rapidement.
        </h2>

        <form class="form-contact" name="contact" method="POST" data-netlify="true" action="/merci.html">
            <input type="hidden" name="form-name" value="contact">
            <div class="ligne-champs">
                <div class="champ-formulaire">
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" name="prenom" required>
                </div>

                <div class="champ-formulaire">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" required>
                </div>
            </div>

            <div class="champ-formulaire">
                <label for="email">Adresse e-mail</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="champ-formulaire">
                <label for="message">Message <i class="fa-solid fa-envelope-open"></i></label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn-primaire">Envoyer le message</button>
        </form>
    </section>
</body>

</html>
